---
- name: OS Patching and Managed Reboot
  hosts: all
  become: yes
  tasks:
    - name: Update all packages (RedHat/CentOS)
      yum:
        name: '*'
        state: latest
      when: ansible_os_family == "RedHat"

    - name: Update all packages (Ubuntu/Debian)
      apt:
        upgrade: dist
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Check if reboot is required (Debian/Ubuntu)
      stat:
        path: /var/run/reboot-required
      register: reboot_required_file
      when: ansible_os_family == "Debian"

    - name: Reboot if kernel was updated
      reboot:
        msg: "Rebooting initiated by Ansible for OS patching"
        connect_timeout: 5
        reboot_timeout: 300
        pre_reboot_delay: 0
        post_reboot_delay: 30
      when: (ansible_os_family == "Debian" and reboot_required_file.stat.exists) or 
            (ansible_os_family == "RedHat") # RedHat usually requires a manual check or triggers on all updates for safety
