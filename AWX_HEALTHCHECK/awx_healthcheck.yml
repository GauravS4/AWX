---
- name: Ubuntu Linux Health Check
  hosts: ubuntu
  become: yes
  gather_facts: yes

  tasks:

    - name: Check system uptime
      command: uptime
      register: uptime_output

    - name: Display uptime
      debug:
        var: uptime_output.stdout

    - name: Check CPU load
      command: cat /proc/loadavg
      register: cpu_load

    - name: Display CPU load
      debug:
        var: cpu_load.stdout

    - name: Check memory usage
      command: free -m
      register: memory_usage

    - name: Display memory usage
      debug:
        var: memory_usage.stdout

    - name: Check disk usage
      command: df -h
      register: disk_usage

    - name: Display disk usage
      debug:
        var: disk_usage.stdout

    - name: Check failed services
      command: systemctl --failed
      register: failed_services
      ignore_errors: yes

    - name: Display failed services
      debug:
        var: failed_services.stdout

    - name: Check listening ports
      command: ss -tuln
      register: open_ports

    - name: Display open ports
      debug:
        var: open_ports.stdout
